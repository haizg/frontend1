<div class="modal-overlay" (click)="close()">
  <form (click)="$event.stopPropagation()">

    <h1>Event Registration</h1>

    <div>
    <label>Email</label>
    <input
      type="email"
      [value]="email"
      readonly
      name="email"
      style="background:#f0f0f0; cursor:not-allowed;"
    />
    </div>

    <br>


    <div>
    <label>Number of participants</label>
    <select [(ngModel)]="participants" name="participants">
      <option *ngFor="let n of [1,2,3,4,5]" [value]="n">
        {{ n }}
      </option>
    </select>
    </div>

    <br>

    <div class="message success-message" *ngIf="message === 'Registration successful'">
      <p>Inscription enregistrée! Veuillez confirmer votre participation en cliquant sur le lien envoyé à votre email.</p>
    </div>

    <p class="message error-message" *ngIf="message && message !== 'Registration successful'">{{ message }}</p>
    <button type="button" (click)="submit()" [disabled]="isLoading">
      {{ isLoading ? 'Submitting...' : 'Submit' }}
    </button>


    <button type="button" class="cancel" (click)="close()">Cancel</button>
</form>
</div>
