<header class="navbar">

  <div class="nav-container">

    <div class="left-section">
      <div class="Invitini">Invitini</div>

      <nav class="nav-links">
        <a routerLink="/home">{{ lang.get('navbar.home') }}</a>
        <a routerLink="/events">{{ lang.get('navbar.events') }}</a>
        <a routerLink="/about">{{ lang.get('navbar.about') }}</a>
        <a routerLink="/contact">{{ lang.get('navbar.contact') }}</a>
      </nav>

    </div>


    <div class="lang-switcher">
      <select
        [(ngModel)]="currentLang"
        (ngModelChange)="lang.switchTo($event)"
        class="custom-select"
      >
        <option value="fr">FR</option>
        <option value="en">EN</option>
      </select>
    </div>

<!--
    <div class="lang-switcher">
      <button (click)="lang.switchTo('fr')" [class.active]="lang.getCurrentLang() === 'fr'">FR</button>
      <button (click)="lang.switchTo('en')" [class.active]="lang.getCurrentLang() === 'en'">EN</button>
    </div>
-->

    <div class="nav-buttons">
      <ng-container *ngIf="!isLoggedIn">

        <button (click)="logIn()" class="btn btn-outline">{{ lang.get('navbar.login') }}</button>
        <button (click)="signUp()" class="btn btn-primary">{{ lang.get('navbar.signup') }}</button>

      </ng-container>

      <div *ngIf="isLoggedIn" class="user-info">
        <a [routerLink]="isAdmin ? '/admin/dashboard' : '/profile'" class="user-name">{{ userName }}</a>
        <button (click)="logOut()" class="btn btn-outline">{{ lang.get('navbar.logout') }}</button>
      </div>


    </div>
  </div>

</header>
