<div class="modal-overlay" *ngIf="isOpen" (click)="close()">
  <div class="confirm-box" (click)="$event.stopPropagation()">

    <button class="close-btn" (click)="close()" type="button">&times;</button>

    <div class="confirm-icon-wrap">
      <i class="fa-solid fa-right-from-bracket"></i>
    </div>

    <h2>{{ 'logout.title' | translate }}</h2>
    <p>{{ 'logout.message' | translate }}</p>

    <div class="confirm-btns">
      <button class="btn-cancel" (click)="close()">{{ 'logout.cancel' | translate }}</button>
      <button class="btn-logout" (click)="confirm()">{{ 'logout.confirm' | translate }}</button>
    </div>

  </div>
</div>
