<section class="join-section">
  <div class="envelope-container">


    <div class="letter">
      <div class="letter-content">
        <h2>{{ 'joincta.join' | translate }}</h2>
        <p class="invitation-text">
          {{ 'joincta.faitespartie' | translate }}
        </p>
        <p class="invitation-subtitle">
          {{ 'joincta.joinsubtitle' | translate }}
        </p>

        <div class="cta-wrapper">
          <button (click)="onJoinClick()" class="invitation-btn">
            <!--{{ 'joincta.button' | translate }}--> Rejoignez-nous
          </button>
          <p class="cta-already-msg" *ngIf="showAlreadyMsg">
            <i class="fa-solid fa-circle-info"></i>
            Vous êtes déjà connecté.
          </p>
        </div>

      <!--  <button class="invitation-btn" (click)="openAuth()">
          Rejoignez-nous
        </button>-->
      </div>
    </div>
    <div class="stamp">
      <i class="fa-solid fa-certificate"></i>
    </div>

    <div class="envelope-back"></div>

    <div class="envelope-front"></div>

    <div class="envelope-flap"></div>



    <div class="hover-hint">Passez la souris pour ouvrir</div>
  </div>
</section>
