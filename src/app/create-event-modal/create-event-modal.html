<div class="modal-backdrop" *ngIf="isVisible" (click)="close()"></div>

<div class="modal-container" *ngIf="isVisible" (click)="$event.stopPropagation()">
  <div class="modal-content">
    <div class="modal-header">
      <h2>{{ 'createevent.title' | translate }}</h2>
      <button class="close-btn" (click)="close()">✕</button>
    </div>

    <form [formGroup]="eventForm" (ngSubmit)="onSubmit()">
      <div class="form-grid">
        <div class="form-group full-width">
          <label>{{ 'createevent.event_title' | translate }} *</label>
          <input
            type="text"
            formControlName="title"
            [placeholder]="'createevent.title_placeholder' | translate"
            class="form-input"
            [disabled]="isLoading">
          <small class="error" *ngIf="eventForm.get('title')?.invalid && eventForm.get('title')?.touched">
            {{ 'createevent.error_title_min' | translate }}
          </small>
        </div>

        <div class="form-group full-width">
          <label>{{ 'createevent.description' | translate }} *</label>
          <textarea
            formControlName="description"
            [placeholder]="'createevent.description_placeholder' | translate"
            rows="4"
            class="form-input"
            [disabled]="isLoading"></textarea>
          <small class="error" *ngIf="eventForm.get('description')?.invalid && eventForm.get('description')?.touched">
            {{ 'createevent.error_description_min' | translate }}
          </small>
        </div>

        <div class="form-group">
          <label>{{ 'createevent.category' | translate }} *</label>
          <select formControlName="category" class="form-input" [disabled]="isLoading">
            <option value="">{{ 'createevent.select_category' | translate }}</option>
            <option value="SPORT">{{ 'createevent.category_sport' | translate }}</option>
            <option value="ART">{{ 'createevent.category_art' | translate }}</option>
            <option value="TECHNOLOGIE">{{ 'createevent.category_tech' | translate }}</option>
            <option value="MUSIQUE">{{ 'createevent.category_music' | translate }}</option>
            <option value="CULTURE">{{ 'createevent.category_culture' | translate }}</option>
            <option value="AUTRE">{{ 'createevent.category_other' | translate }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>{{ 'createevent.date' | translate }} *</label>
          <input
            type="date"
            formControlName="date"
            class="form-input"
            [min]="today"
            [disabled]="isLoading">
        </div>

        <div class="form-group">
          <label>{{ 'createevent.time' | translate }} *</label>
          <input
            type="time"
            formControlName="time"
            class="form-input"
            [disabled]="isLoading">
        </div>

        <div class="form-group">
          <label>{{ 'createevent.location' | translate }} *</label>
          <input
            type="text"
            formControlName="location"
            [placeholder]="'createevent.location_placeholder' | translate"
            class="form-input"
            [disabled]="isLoading">
        </div>

        <div class="form-group full-width">
          <label>{{ 'createevent.event_image' | translate }}</label>

          <input
            type="file"
            #fileInput
            (change)="onFileSelected($event)"
            accept="image/*"
            style="display: none;"
            [disabled]="isLoading">

          <button
            type="button"
            class="btn-upload"
            (click)="fileInput.click()"
            *ngIf="!imagePreview && !isLoading"
            [disabled]="isLoading">
            {{ 'createevent.choose_image' | translate }}
          </button>

          <div class="image-preview-container" *ngIf="imagePreview && !isLoading">
            <img [src]="imagePreview" alt="Preview" class="image-preview">
            <div class="image-actions">
              <button type="button" class="btn-change" (click)="fileInput.click()">
                 {{ 'createevent.change_image' | translate }}
              </button>
              <button type="button" class="btn-remove" (click)="removeImage()">
                 {{ 'createevent.remove_image' | translate }}
              </button>
            </div>
          </div>

          <small class="info-text">{{ 'createevent.image_info' | translate }}</small>
        </div>

        <div class="form-group">
          <label>{{ 'createevent.max_participants' | translate }}</label>
          <input
            type="number"
            formControlName="maxParticipants"
            [placeholder]="'createevent.max_participants_placeholder' | translate"
            min="1"
            class="form-input"
            [disabled]="isLoading">
        </div>
      </div>

      <!-- Error Message -->
      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <!-- Approval Message -->
      <div class="approval-message" *ngIf="approvalMessage">
        <div class="approval-icon"></div>
        <div class="approval-text">{{ approvalMessage }}</div>
        <div class="approval-note">{{ 'createevent.close_window_note' | translate }}</div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-cancel" (click)="close()" [disabled]="isLoading">
          {{ 'createevent.close' | translate }}
        </button>
        <button
          type="submit"
          class="btn-submit"
          [disabled]="isLoading || eventForm.invalid"
          *ngIf="!approvalMessage">
          <span *ngIf="isLoading"> {{ 'createevent.creating' | translate }}</span>
          <span *ngIf="!isLoading"> {{ 'createevent.create_button' | translate }}</span>
        </button>
      </div>
    </form>
  </div>
</div>
