<div class="modal-backdrop" *ngIf="isVisible" (click)="close()"></div>

<div class="modal-container" *ngIf="isVisible" (click)="$event.stopPropagation()">
  <div class="modal-content">
    <div class="modal-header">
      <h2> Créer un Événement</h2>
      <button class="close-btn" (click)="close()">✕</button>
    </div>

    <form [formGroup]="eventForm" (ngSubmit)="onSubmit()">
      <div class="form-grid">
        <div class="form-group full-width">
          <label>Titre de l'événement *</label>
          <input
            type="text"
            formControlName="title"
            placeholder="Ex: Marathon de Tunis"
            class="form-input">
          <small class="error" *ngIf="eventForm.get('title')?.invalid && eventForm.get('title')?.touched">
            Le titre doit contenir au moins 3 caractères
          </small>
        </div>

        <div class="form-group full-width">
          <label>Description *</label>
          <textarea
            formControlName="description"
            placeholder="Décrivez votre événement..."
            rows="4"
            class="form-input"></textarea>
          <small class="error" *ngIf="eventForm.get('description')?.invalid && eventForm.get('description')?.touched">
            La description doit contenir au moins 10 caractères
          </small>
        </div>

        <div class="form-group">
          <label>Catégorie *</label>
          <select formControlName="category" class="form-input">
            <option value="">Sélectionner une catégorie</option>
            <option value="SPORT">Sport</option>
            <option value="ART">Art</option>
            <option value="TECHNOLOGIE">Technologie</option>
            <option value="MUSIQUE">Musique</option>
            <option value="CULTURE">Culture</option>
            <option value="AUTRE">Autre</option>
          </select>
        </div>

        <div class="form-group">
          <label>Date *</label>
          <input
            type="date"
            formControlName="date"
            class="form-input"
          [min]="today">
        </div>

        <div class="form-group">
          <label>Heure *</label>
          <input
            type="time"
            formControlName="time"
            class="form-input">
        </div>

        <div class="form-group">
          <label>Lieu *</label>
          <input
            type="text"
            formControlName="location"
            placeholder="Ex: Tunis, Tunisia"
            class="form-input">
        </div>


        <div class="form-group full-width">
          <label>Image de l'événement</label>

          <input
            type="file"
            #fileInput
            (change)="onFileSelected($event)"
            accept="image/*"
            style="display: none;">

          <button
            type="button"
            class="btn-upload"
            (click)="fileInput.click()"
            *ngIf="!imagePreview">
            📷 Choisir une image
          </button>

          <div class="image-preview-container" *ngIf="imagePreview">
            <img [src]="imagePreview" alt="Preview" class="image-preview">
            <div class="image-actions">
              <button type="button" class="btn-change" (click)="fileInput.click()">
                  Changer
              </button>
              <button type="button" class="btn-remove" (click)="removeImage()">
                 Supprimer
              </button>
            </div>
          </div>

          <small class="info-text">Formats acceptés: JPEG, PNG, GIF (max 10 MB)</small>
        </div>

        <div class="form-group">
          <label>Nombre max de participants</label>
          <input
            type="number"
            formControlName="maxParticipants"
            placeholder="Ex: 100"
            min="1"
            class="form-input">
        </div>
      </div>

      <div class="error-message" *ngIf="errorMessage">
         {{ errorMessage }}
      </div>

      <div class="success-message" *ngIf="successMessage">
         {{ successMessage }}
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-cancel" (click)="close()" [disabled]="isLoading || isUploadingImage">
          Annuler
        </button>
        <button
          type="submit"
          class="btn-submit"
          [disabled]="isLoading || isUploadingImage || eventForm.invalid">
          <span *ngIf="isUploadingImage"> Téléchargement...</span>
          <span *ngIf="!isUploadingImage && isLoading"> Création...</span>
          <span *ngIf="!isUploadingImage && !isLoading"> Créer l'événement</span>
        </button>
      </div>
    </form>
  </div>
</div>
