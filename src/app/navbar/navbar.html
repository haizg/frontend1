<header class="navbar">

  <div class="nav-container">

    <div class="left-section">
      <div class="vera">Véra</div>

      <nav class="nav-links">
        <a routerLink="/home">{{ 'navbar.home' | translate }}</a>
        <a routerLink="/events">{{ 'navbar.events' | translate }}</a>
        <a routerLink="/about">{{ 'navbar.about' | translate }}</a>
        <a routerLink="/contact">{{ 'navbar.contact' | translate }}</a>
      </nav>
    </div>


    <div class="lang-switcher">
      <button (click)="switchLang('fr')" [class.active]="currentLang === 'fr'">FR</button>
      <button (click)="switchLang('en')" [class.active]="currentLang === 'en'">EN</button>
    </div>


    <div class="nav-buttons">
      <ng-container *ngIf="!isLoggedIn">
        <button (click)="logIn()" class="btn btn-outline">{{ 'navbar.login' | translate }}</button>
        <button (click)="signUp()" class="btn btn-primary">{{ 'navbar.signup' | translate }}</button>
      </ng-container>

      <div *ngIf="isLoggedIn" class="user-info">
        <a [routerLink]="['/profile']" class="user-name">{{ userName }}</a>
        <button *ngIf="isLoggedIn" (click)="logOut()" class="btn btn-outline" >{{ 'navbar.logout' | translate }}</button>
      </div>
    </div>
  </div>

</header>
