<div class="modal-backdrop" *ngIf="isVisible" (click)="close()"></div>

<div class="modal-container" *ngIf="isVisible" (click)="$event.stopPropagation()">
  <div class="modal-content">
    <!-- Loading Overlay -->
    <div class="loading-overlay" *ngIf="isLoading">
      <div class="loading-spinner-modal">
        <div class="spinner-modal"></div>
        <p class="loading-text-modal">{{ 'editevent.updating' | translate }}</p>
      </div>
    </div>

    <div class="modal-header">
      <h2>{{ 'editevent.title' | translate }}</h2>
      <button class="close-btn" (click)="close()">✕</button>
    </div>

    <form [formGroup]="eventForm" (ngSubmit)="onSubmit()">
      <div class="form-grid">
        <div class="form-group full-width">
          <label>{{ 'editevent.event_title' | translate }} *</label>
          <input
            type="text"
            formControlName="title"
            [placeholder]="'editevent.title_placeholder' | translate"
            class="form-input"
            [disabled]="isLoading">
          <small class="error" *ngIf="eventForm.get('title')?.invalid && eventForm.get('title')?.touched">
            {{ 'editevent.error_title_min' | translate }}
          </small>
        </div>

        <div class="form-group full-width">
          <label>{{ 'editevent.description' | translate }} *</label>
          <textarea
            formControlName="description"
            [placeholder]="'editevent.description_placeholder' | translate"
            rows="4"
            class="form-input"
            [disabled]="isLoading"></textarea>
          <small class="error" *ngIf="eventForm.get('description')?.invalid && eventForm.get('description')?.touched">
            {{ 'editevent.error_description_min' | translate }}
          </small>
        </div>

        <div class="form-group">
          <label>{{ 'editevent.category' | translate }} *</label>
          <select formControlName="category" class="form-input" [disabled]="isLoading">
            <option value="">{{ 'editevent.select_category' | translate }}</option>
            <option value="SPORT">{{ 'editevent.category_sport' | translate }}</option>
            <option value="ART">{{ 'editevent.category_art' | translate }}</option>
            <option value="TECHNOLOGIE">{{ 'editevent.category_tech' | translate }}</option>
            <option value="MUSIQUE">{{ 'editevent.category_music' | translate }}</option>
            <option value="CULTURE">{{ 'editevent.category_culture' | translate }}</option>
            <option value="AUTRE">{{ 'editevent.category_other' | translate }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>{{ 'editevent.date' | translate }} *</label>
          <input
            type="date"
            formControlName="date"
            class="form-input"
            [disabled]="isLoading">
        </div>

        <div class="form-group">
          <label>{{ 'editevent.time' | translate }} *</label>
          <input
            type="time"
            formControlName="time"
            class="form-input"
            [disabled]="isLoading">
        </div>

        <div class="form-group">
          <label>{{ 'editevent.location' | translate }} *</label>
          <input
            type="text"
            formControlName="location"
            [placeholder]="'editevent.location_placeholder' | translate"
            class="form-input"
            [disabled]="isLoading">
        </div>

        <div class="form-group full-width">
          <label>{{ 'editevent.event_image' | translate }}</label>
          <input
            type="url"
            formControlName="imageUrl"
            [placeholder]="'editevent.image_placeholder' | translate"
            class="form-input"
            [disabled]="isLoading">
          <small class="info-text">{{ 'editevent.image_info' | translate }}</small>
        </div>

        <div class="form-group">
          <label>{{ 'editevent.max_participants' | translate }}</label>
          <input
            type="number"
            formControlName="maxParticipants"
            [placeholder]="'editevent.max_participants_placeholder' | translate"
            min="1"
            class="form-input"
            [disabled]="isLoading">
        </div>
      </div>

      <div class="error-message" *ngIf="errorMessage">
         {{ errorMessage }}
      </div>

      <div class="success-message" *ngIf="successMessage">
         {{ successMessage }}
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-cancel" (click)="close()" [disabled]="isLoading">
          {{ 'editevent.cancel' | translate }}
        </button>
        <button type="submit" class="btn-submit" [disabled]="isLoading || eventForm.invalid">
          <span *ngIf="isLoading"> {{ 'editevent.updating' | translate }}</span>
          <span *ngIf="!isLoading">{{ 'editevent.save' | translate }}</span>
        </button>
      </div>
    </form>
  </div>
</div>
