<div [class.page-blur]="isModalOpen || isSignupModalOpen || isJoinModalOpen">
  <app-navbar></app-navbar>

  <div class="events-page-container">
    <h1 class="page-title">Tous les événements</h1>

    <div class="events-grid">
      <div class="event-card" *ngFor="let event of events"
           [routerLink]="['/api/events', event.id]" style="cursor:pointer;">
        <div class="event-image">
          <img [src]="event.imageUrl || 'assets/placeholder.png'" [alt]="event.title">
        </div>
        <div class="event-body">
          <span class="event-category">{{ event.category }}</span>
          <h3 class="event-title">{{ event.title }}</h3>
          <p class="event-meta">📅 {{ event.date }} &nbsp; {{ event.time }}</p>
          <p class="event-meta">📍 {{ event.location }}</p>
          <button *ngIf="!isOrganisateur"
                  (click)="openJoinModal(event.id); $event.stopPropagation()"
                  class="btn-participate">
            Participer
          </button>
        </div>
      </div>
    </div>

    <p *ngIf="events.length === 0" class="no-events">Aucun événement disponible.</p>
  </div>

  <app-footer></app-footer>
</div>

<app-login *ngIf="isModalOpen"></app-login>
<app-sign-up-org *ngIf="isSignupModalOpen"></app-sign-up-org>
<app-popup *ngIf="isJoinModalOpen"></app-popup>
